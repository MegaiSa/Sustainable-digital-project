<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Sustainable Digital Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="handler.html">Make a Quiz</a></li>
            <li><a href="register.html">Register</a></li>
            <li id="nav-logout" style="display:none;">
                <a href="#" onclick="logout()">Log out</a>
            </li>
        </ul>
    </nav>
    <p>Welcome, <span id="user-name"></span>!</p>
    <div class="container">
        <section id="register">
            <h1>Create your account</h1>
            <div>
                <div>
                    <label for="nickname">Full nickname</label>
                    <input type="text" id="nickname" placeholder="Your full nickname" required>
                </div>
                <div>
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div>
                    <label for="confirm-password">Confirm password</label>
                    <input type="password" id="confirm-password" placeholder="Repeat your password" required>
                </div>
                <button type="button" onclick="handleRegister()">Register</button>
                <p class="msg" id="register-msg"></p>
            </div>
        </section>

        <section id="login">
            <h1>Log in to your account</h1>
            <div>
                <div>
                    <label for="login-email">Email address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" required>
                </div>
                <div>
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Your password" required>
                </div>
                <button type="button" onclick="handleLogin()">Log in</button>
                <p class="msg" id="login-msg"></p>
            </div>
        </section>
    </div>

    <script>
        async function checkSession() {
            try {
                const res = await fetch('/api/me');
                const data = await res.json();
                    if (data.loggedIn) {
                        document.getElementById('user-name').textContent = data.username;
                        document.getElementById('nav-logout').style.display = '';
                        document.getElementById('nav-auth').style.display = 'none';
                    }
            } catch (_) {}
        }

        async function handleRegister() {
            const msg = document.getElementById('register-msg');
            msg.textContent = '';
            msg.className = 'msg';

            const body = {
                nickname: document.getElementById('nickname').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirm-password').value,
            };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!res.ok) {
                    msg.textContent = data.error;
                    msg.classList.add('error');
                } else {
                    msg.textContent = `Welcome, ${data.username}! Redirecting…`;
                    msg.classList.add('success');
                    setTimeout(() => window.location.href = 'index.html', 1200);
                }
            } catch (err) {
                msg.textContent = 'Network error. Please try again.';
                msg.classList.add('error');
            }
        }

        async function handleLogin() {
            const msg = document.getElementById('login-msg');
            msg.textContent = '';
            msg.className = 'msg';

            const body = {
                email: document.getElementById('login-email').value.trim(),
                password: document.getElementById('login-password').value,
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                if (!res.ok) {
                    msg.textContent = data.error;
                    msg.classList.add('error');
                } else {
                    msg.textContent = `Welcome back, ${data.username}! Redirecting…`;
                    msg.classList.add('success');
                    setTimeout(() => window.location.href = 'index.html', 1200);
                }
            } catch (err) {
                msg.textContent = 'Network error. Please try again.';
                msg.classList.add('error');
            }
        }
    </script>
</body>
</html>
