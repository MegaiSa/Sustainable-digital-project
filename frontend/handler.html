<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Handler</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="handler.html">Make a Quiz</a></li>
            <li><a href="register.html" id="nav-auth">Register</a></li>
            <li id="nav-logout" style="display:none;">
                <a href="#" onclick="logout()">Log out</a>
            </li>
        </ul>
    </nav>
    <p>Welcome, <span id="user-name"></span>!</p>
    <main class="container">
        <h1>All Quizzes</h1>
        <p>View all quizzes, create a new quiz, or return to the homepage.</p>
        <button class="create-quiz container button" onclick="createQuiz()">Create a Quiz</button>
        
        <!-- We will inject the quizzes here -->
        <ul id="dynamic-quiz-list" class="quiz-list">
            <li>Loading quizzes...</li>
        </ul>
    </main>

    <script>
        let currentUser = null;

        async function checkSession() {
            try {
                const res = await fetch('/api/me');
                const data = await res.json();
                const authLink = document.getElementById('nav-auth');
                if (data.loggedIn) {
                    currentUser = data;
                    document.getElementById('nav-auth').style.display = 'none';
                    document.getElementById('user-name').textContent = data.username;
                    document.getElementById('nav-logout').style.display = '';
                }
                loadQuizzes();
            } catch (err) {
                console.error("Session check failed");
            }
        }

        async function loadQuizzes() {
            const list = document.getElementById('dynamic-quiz-list');
            try {
                const res = await fetch('/api/quizzes');
                if (!res.ok) throw new Error("Failed to fetch quizzes from server.");
                const quizzes = await res.json();
                
                list.innerHTML = ''; 
                
                for (const quiz of quizzes) {
                    const li = document.createElement('li');
                    
                    const titleP = document.createElement('p');
                    titleP.innerHTML = `<strong>${quiz.title}</strong> (${quiz.difficulty})`;
                    li.appendChild(titleP);

                    // Permission Check
                    const hasAccess = currentUser && (currentUser.role === 'admin' || currentUser.userId === quiz.user_id);

                    const qRes = await fetch(`/api/quizzes/${quiz.id}/questions`);
                    if (!qRes.ok) throw new Error(`Failed to fetch questions for quiz ${quiz.id}`);
                    const questions = await qRes.json();

                    const qList = document.createElement('ul');
                    qList.className = 'question-list';
                    
                    const toggleBtn = document.createElement('button');
                    toggleBtn.textContent = 'Show questions';
                    
                    const questionsDiv = document.createElement('div');
                    questionsDiv.hidden = true;

                    toggleBtn.onclick = () => {
                        questionsDiv.hidden = !questionsDiv.hidden;
                        toggleBtn.textContent = questionsDiv.hidden ? 'Show questions' : 'Hide questions';
                    };
                    qList.appendChild(toggleBtn);

                    questions.forEach((q, index) => {
                        const qLi = document.createElement('li');
                        
                        const readOnlyAttr = hasAccess ? '' : 'readonly';
                        
                        qLi.innerHTML = `
                            <p style="margin-top: 15px;"><strong>Question ${index + 1}:</strong></p>
                            <input type="text" class="edit-text" value="${q.question_text}" style="margin-bottom: 10px;" ${readOnlyAttr}>
                            
                            <label>Option A:</label> <input type="text" class="edit-opt-a" value="${q.option_a}" ${readOnlyAttr}>
                            <label>Option B:</label> <input type="text" class="edit-opt-b" value="${q.option_b}" ${readOnlyAttr}>
                            <label>Option C:</label> <input type="text" class="edit-opt-c" value="${q.option_c}" ${readOnlyAttr}>
                            <label>Option D:</label> <input type="text" class="edit-opt-d" value="${q.option_d}" ${readOnlyAttr}>
                            
                            <p style="font-size: 0.9rem; color: var(--accent); font-weight: bold;">
                                Correct Answer (A, B, C, D): 
                                <input type="text" class="edit-correct" value="${q.correct_answer}" style="width: 50px; text-align: center; display: inline-block;" ${readOnlyAttr}>
                            </p>
                        `;

                        if (hasAccess) {
                            const saveQstBtn = document.createElement('button');
                            saveQstBtn.className = 'create-qst'; 
                            saveQstBtn.style.marginRight = '10px';
                            saveQstBtn.textContent = 'Save Changes';
                            saveQstBtn.onclick = () => saveQuestionChanges(q.id, qLi);
                            qLi.appendChild(saveQstBtn);

                            const delQstBtn = document.createElement('button');
                            delQstBtn.className = 'delete-btn';
                            delQstBtn.textContent = 'Delete Question';
                            delQstBtn.onclick = () => deleteQuestion(q.id);
                            qLi.appendChild(delQstBtn);
                        }
                        questionsDiv.appendChild(qLi);
                    });

                    if (hasAccess) {
                        const addQstBtn = document.createElement('button');
                        addQstBtn.className = 'create-qst';
                        addQstBtn.textContent = 'Add a Question';
                        addQstBtn.onclick = () => createQuestion(quiz.id);
                        questionsDiv.appendChild(addQstBtn);
                    }

                    qList.appendChild(questionsDiv);
                    li.appendChild(qList);

                    if (hasAccess) {
                        const delQuizBtn = document.createElement('button');
                        delQuizBtn.className = 'delete-btn';
                        delQuizBtn.textContent = 'Delete Quiz';
                        delQuizBtn.onclick = () => deleteQuiz(quiz.id);
                        li.appendChild(delQuizBtn);
                    }

                    list.appendChild(li);
                }
            } catch (err) {
                console.error("The error is:", err); 
            }
        }

        async function createQuiz() {
            if (!currentUser) return alert("You must be logged in to create a quiz!");
            const title = prompt("Enter quiz title:");
            const difficulty = prompt("Enter difficulty (Easy, Medium, Hard):", "Medium");
            if (!title || !difficulty) return;

            try {
                const res = await fetch('/api/quizzes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, difficulty })
                });
                if (res.ok) loadQuizzes();
                else alert("Error: " + (await res.json()).error);
            } catch (err) { alert("Network error."); }
        }

        async function deleteQuiz(quizId) {
            if (!confirm("Are you sure you want to delete this quiz? All questions will be lost.")) return;
            try {
                const res = await fetch(`/api/quizzes/${quizId}`, { method: 'DELETE' });
                if (res.ok) loadQuizzes();
                else alert("Error: " + (await res.json()).error);
            } catch (err) { alert("Network error."); }
        }

        async function createQuestion(quizId) {
            const text = prompt("Enter the question:");
            if (!text) return;
            const optA = prompt("Option A:");
            const optB = prompt("Option B:");
            const optC = prompt("Option C:");
            const optD = prompt("Option D:");
            const correct = prompt("Correct Answer Letter (A, B, C, or D):");

            if (!optA || !optB || !optC || !optD || !correct) return alert("All fields required!");

            try {
                const res = await fetch(`/api/quizzes/${quizId}/questions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question_text: text,
                        option_a: optA, option_b: optB, option_c: optC, option_d: optD,
                        correct_answer: correct.toUpperCase()
                    })
                });
                if (res.ok) loadQuizzes();
                else alert("Error: " + (await res.json()).error);
            } catch (err) { alert("Network error."); }
        }

        async function deleteQuestion(questionId) {
            if (!confirm("Delete this question?")) return;
            try {
                const res = await fetch(`/api/questions/${questionId}`, { method: 'DELETE' });
                if (res.ok) loadQuizzes();
                else alert("Error: " + (await res.json()).error);
            } catch (err) { alert("Network error."); }
        }

        async function saveQuestionChanges(questionId, listItemElement) {
            const text = listItemElement.querySelector('.edit-text').value;
            const optA = listItemElement.querySelector('.edit-opt-a').value;
            const optB = listItemElement.querySelector('.edit-opt-b').value;
            const optC = listItemElement.querySelector('.edit-opt-c').value;
            const optD = listItemElement.querySelector('.edit-opt-d').value;
            const correct = listItemElement.querySelector('.edit-correct').value.toUpperCase();

            if (!text || !optA || !optB || !optC || !optD || !correct) return alert("All fields required!");
            if (!['A', 'B', 'C', 'D'].includes(correct)) return alert("Correct answer must be A, B, C, or D.");

            try {
                const res = await fetch(`/api/questions/${questionId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question_text: text,
                        option_a: optA, option_b: optB, option_c: optC, option_d: optD,
                        correct_answer: correct
                    })
                });
                
                if (res.ok) {
                    alert("Changes saved successfully!");
                    loadQuizzes();
                } else {
                    alert("Error: " + (await res.json()).error);
                }
            } catch (err) { alert("Network error."); }
        }

        // Start the process
        checkSession();
    </script>
</body>
</html>
