<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainable Digital Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="handler.html">Make a Quiz</a></li>
            <li><a href="register.html" id="nav-auth">Register</a></li>
            <li id="nav-logout" style="display:none;">
                <a href="#" onclick="logout()">Log out</a>
            </li>
        </ul>
    </nav>

    <main>
        <h1>Welcome to the Sustainable Digital Project</h1>
        <p id="welcome-msg">This is a quiz about multiple subjects, testing your knowledge while being environmentally conscious.</p>
    </main>

    <section id="leaderboard">
        <h2>🏆 Global Leaderboard</h2>
        <p>Top quiz performers:</p>
        <ol id="leaderboard-list">
            <li>Loading…</li>
        </ol>
    </section>

    <script>
        // ── Check session ─────────────────────────────────────────────────

        async function checkSession() {
            try {
                const res = await fetch('/api/me');
                const data = await res.json();
                if (data.loggedIn) {
                    document.getElementById('welcome-msg').textContent =
                        `Welcome back, ${data.username}! Ready to quiz?`;
                    document.getElementById('nav-auth').textContent = 'My Account';
                    document.getElementById('nav-auth').href = 'register.html';
                    document.getElementById('nav-logout').style.display = '';
                }
            } catch (_) {}
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.reload();
        }

        // ── Load global leaderboard ────────────────────────────────────────

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard?limit=5');
                const rows = await res.json();
                const ol = document.getElementById('leaderboard-list');

                if (!rows.length) {
                    ol.innerHTML = '<li>No scores yet. Be the first!</li>';
                    return;
                }

                ol.innerHTML = rows.map(r =>
                    `<li>${r.username} — ${r.total_score} pts (${r.quizzes_taken} quiz${r.quizzes_taken > 1 ? 'zes' : ''})</li>`
                ).join('');
            } catch (_) {
                document.getElementById('leaderboard-list').innerHTML = '<li>Leaderboard unavailable.</li>';
            }
        }

        checkSession();
        loadLeaderboard();
    </script>
</body>
</html>
