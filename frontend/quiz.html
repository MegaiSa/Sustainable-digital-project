<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz — Sustainable Digital Project</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="handler.html">Make a Quiz</a></li>
            <li><a href="register.html">Register</a></li>
            <li id="nav-logout" style="display:none;">
                <a href="#" onclick="logout()">Log out</a>
            </li>
        </ul>
    </nav>
    <p>Welcome, <span id="user-name"></span>!</p>
    <section id="quiz-picker">
        <h2>Choose a Quiz</h2>
        <select id="quiz-select">
            <option value="">Loading quizzes…</option>
        </select>
        <button onclick="startQuiz()">Start</button>
    </section>

    <section id="quiz" style="display:none;">
        <p id="question-counter">Question 1 / ?</p>
        <p id="question-text"></p>
        <ul id="options"></ul>
        <div id="result"></div>
        <button id="next-btn" style="display:none;" onclick="nextQuestion()">Next →</button>
        <button id="finish-btn" style="display:none;" onclick="finishQuiz()">Finish &amp; Submit Score</button>
    </section>

    <script>
        let quizzes = [];
        let questions = [];
        let currentIndex = 0;
        let score = 0;
        let answered = false;
        let currentQuizId = null;

        async function checkSession() {
            try {
                const res = await fetch('/api/me');
                const data = await res.json();
                    if (data.loggedIn) {
                        document.getElementById('user-name').textContent = data.username;
                        document.getElementById('nav-logout').style.display = '';
                        document.getElementById('nav-auth').style.display = 'none';
                    }
            } catch (_) {}
        }

        // ── Load quiz list ──────────────────────────────────────────────────

        async function loadQuizzes() {
            const res = await fetch('/api/quizzes');
            quizzes = await res.json();
            const sel = document.getElementById('quiz-select');
            sel.innerHTML = quizzes.length
                ? quizzes.map(q => `<option value="${q.id}">${q.title} (${q.difficulty})</option>`).join('')
                : '<option value="">No quizzes available</option>';
        }

        // ── Start quiz ─────────────────────────────────────────────────────

        async function startQuiz() {
            const quizId = document.getElementById('quiz-select').value;
            if (!quizId) return alert('Please select a quiz.');
            currentQuizId = quizId;

            const res = await fetch(`/api/quizzes/${quizId}/questions`);
            questions = await res.json();

            if (!questions.length) return alert('This quiz has no questions yet.');

            currentIndex = 0;
            score = 0;

            document.getElementById('quiz-picker').style.display = 'none';
            document.getElementById('quiz').style.display = '';
            renderQuestion();
        }

        // ── Render current question ────────────────────────────────────────

        function renderQuestion() {
            answered = false;
            const q = questions[currentIndex];
            document.getElementById('question-counter').textContent =
                `Question ${currentIndex + 1} / ${questions.length}`;
            document.getElementById('question-text').textContent = q.question_text;
            document.getElementById('result').textContent = '';

            const opts = [
                { letter: 'A', text: q.option_a },
                { letter: 'B', text: q.option_b },
                { letter: 'C', text: q.option_c },
                { letter: 'D', text: q.option_d },
            ];

            const ul = document.getElementById('options');
            ul.innerHTML = opts.map(o =>
                `<li onclick="checkAnswer(this, '${o.letter}', '${q.correct_answer}')">${o.text}</li>`
            ).join('');

            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('finish-btn').style.display = 'none';
        }
        
        function renderQuiz(quiz, loggedInUser) {
            const quizElement = document.createElement('div');
            quizElement.innerHTML = `<h3>${quiz.title}</h3>`;
        
            const isAdmin = loggedInUser.role === 'admin';
            const isAuthor = loggedInUser.id === quiz.user_id;
        
            if (isAdmin || isAuthor) {
                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = 'Delete Quiz';
                deleteBtn.onclick = () => deleteQuiz(quiz.id);
                quizElement.appendChild(deleteBtn);
            }
            document.getElementById('quiz-container').appendChild(quizElement);
        }
        // ── Check answer ───────────────────────────────────────────────────

        function checkAnswer(el, chosen, correct) {
            if (answered) return;
            answered = true;

            const items = document.querySelectorAll('#options li');
            const letters = ['A', 'B', 'C', 'D'];
            items.forEach((li, i) => {
                li.style.pointerEvents = 'none';
                if (letters[i] === correct) li.classList.add('correct');
            });

            if (chosen === correct) {
                score += 10;
                document.getElementById('result').textContent = '✅ Correct! +10 pts';
            } else {
                el.classList.add('wrong');
                document.getElementById('result').textContent = `❌ Wrong. Correct answer: ${correct}`;
            }

            const isLast = currentIndex === questions.length - 1;
            document.getElementById('next-btn').style.display = isLast ? 'none' : 'inline-block';
            document.getElementById('finish-btn').style.display = isLast ? 'inline-block' : 'none';
        }

        // ── Next question ──────────────────────────────────────────────────

        function nextQuestion() {
            currentIndex++;
            renderQuestion();
        }

        // ── Submit score ───────────────────────────────────────────────────

        async function finishQuiz() {
            const section = document.getElementById('quiz');
            section.querySelector('#options').innerHTML = '';
            section.querySelector('#question-text').textContent = '';
            section.querySelector('#question-counter').textContent = 'Quiz complete!';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('finish-btn').style.display = 'none';
            document.getElementById('result').textContent = `Your score: ${score} / ${questions.length * 10}`;

            try {
                await fetch(`/api/quizzes/${currentQuizId}/scores`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ score }),
                });
            } catch (_) {}
        }

        // ── Init ───────────────────────────────────────────────────────────
        loadQuizzes();
    </script>
</body>
</html>
